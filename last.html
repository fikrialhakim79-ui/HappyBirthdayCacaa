<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Beautiful Memories ✨</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;400;500;600&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffd1dc, #f8d7f0, #e6e6fa, #ffd1dc);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
            font-family: 'Quicksand', sans-serif;
            color: #4a4a4a;
            overflow-x: hidden;
            cursor: auto;
        }
        @keyframes gradientFlow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        
        h1 {
            text-align: center;
            padding-top: 40px;
            font-family: 'Dancing Script', cursive;
            font-size: 3.8rem;
            color: #ff69b4;
            text-shadow: 0 0 20px rgba(255,105,180,0.5);
        }
        .memories {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }
        .memory-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(255,105,180,0.2);
            transition: transform 0.3s;
        }
        .memory-card:hover { transform: scale(1.05); }
        .memory-card img {
            width: 100%;
            height: 320px;
            object-fit: cover;
        }
        .memory-card p {
            padding: 15px;
            text-align: center;
            font-size: 1.1rem;
            color: #ff69b4;
        }
        .ending {
            text-align: center;
            padding: 40px 20px;
            font-size: 1.8rem;
            color: #ff69b4;
            margin-bottom: 20px;
        }
        
        /* LOVE BUTTON DESIGN */
        .love-button-container {
            display: flex;
            justify-content: center;
            padding: 30px 20px;
        }
        
        .love-button {
            position: relative;
            padding: 18px 45px;
            font-size: 1.3rem;
            font-family: 'Dancing Script', cursive;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 
                0 8px 30px rgba(255, 105, 180, 0.4),
                0 0 0 0 rgba(255, 105, 180, 0.7);
            animation: pulse-glow 2s infinite;
            transition: all 0.3s ease;
            overflow: hidden;
            z-index: 10;
        }
        
        .love-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        .love-button:hover {
            transform: scale(1.15) translateY(-3px);
            box-shadow: 
                0 12px 50px rgba(255, 105, 180, 0.6),
                0 0 30px rgba(255, 20, 147, 0.5);
        }
        
        .love-button:hover::before {
            left: 100%;
        }
        
        .love-button:active {
            transform: scale(1.1) translateY(-1px);
        }
        
        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 
                    0 8px 30px rgba(255, 105, 180, 0.4),
                    0 0 0 0 rgba(255, 105, 180, 0.7);
            }
            50% {
                box-shadow: 
                    0 8px 30px rgba(255, 105, 180, 0.5),
                    0 0 0 15px rgba(255, 105, 180, 0);
            }
        }
        
        .floating { position: fixed; z-index: 999; pointer-events: none; }
        
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .ending { font-size: 1.4rem; }
            .love-button { font-size: 1.1rem; padding: 15px 35px; }
        }
    </style>
</head>
<body>
    <h1>Happy Birthday Caca Cantiikkk 💗</h1>

    <div class="memories">
        <div class="memory-card">
            <img src="d1.jpg" alt="Memory 1">
            <p>Kamu yang paling cantik di mataku 💕</p>
        </div>
        <div class="memory-card">
            <img src="d2.jpg" alt="Memory 2">
            <p>Setiap senyummu bikin hariku cerah ✨</p>
        </div>
        <div class="memory-card">
            <img src="d3.jpg" alt="Memory 3">
            <p>Terima kasih sudah ada di hidupku 🥰</p>
        </div>
    </div>

    <div class="ending">
        I LOVE YOU FOREVER CACAA 💖<br>
        Semoga panjang umur, sehat selalu, dan bahagia setiap hari ya sayangku 🌸
    </div>

    <div class="love-button-container">
        <button id="love-button" class="love-button">💖 I Love You Cacaa 💖</button>
    </div>

    <!-- MUSIK AUTO PLAY (HIDDEN) -->
    <iframe id="youtube-player" width="0" height="0" 
        src="https://www.youtube.com/embed/n5i3QRvPA9Y?enablejsapi=1&autoplay=1&loop=1&start=18&playlist=n5i3QRvPA9Y" 
        frameborder="0" allow="autoplay; encrypted-media" style="display:none;"></iframe>

    <script src="audio-manager.js"></script>
    <script>
        // Floating hearts
        function createFloating() {
            const element = document.createElement('div');
            element.className = 'floating';
            element.textContent = ['💖','💗','🌸','✨'][Math.floor(Math.random()*4)];
            element.style.left = Math.random() * 100 + 'vw';
            element.style.top = Math.random() * 100 + 'vh';
            element.style.fontSize = (Math.random() * 35 + 25) + 'px';
            document.body.appendChild(element);

            gsap.to(element, {
                y: -800,
                x: Math.random() * 200 - 100,
                rotation: Math.random() * 720,
                duration: Math.random() * 8 + 8,
                opacity: 0,
                onComplete: () => element.remove()
            });
        }
        setInterval(createFloating, 600);

        // === LOVE BUTTON CLICK ===
        document.getElementById('love-button').addEventListener('click', () => {
            const btn = document.getElementById('love-button');
            btn.style.transform = 'scale(0.9)';
            
            // Create love explosion effect
            for (let i = 0; i < 100; i++) {
                const heart = document.createElement('div');
                heart.textContent = '💖';
                heart.style.position = 'fixed';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = '60vh';
                heart.style.fontSize = (Math.random() * 40 + 25) + 'px';
                heart.style.zIndex = '9998';
                heart.style.pointerEvents = 'none';
                heart.style.fontWeight = 'bold';
                document.body.appendChild(heart);
                
                gsap.to(heart, {
                    y: -window.innerHeight - 300,
                    x: Math.random() * 400 - 200,
                    rotation: Math.random() * 1080,
                    duration: Math.random() * 3 + 2.5,
                    opacity: 0,
                    ease: "power2.out",
                    onComplete: () => heart.remove()
                });
            }
            
            setTimeout(() => {
                alert("💖 I LOVE YOU SO MUCH CACAA 💖\nYou make my world brighter every day! 🌍✨\nHappy Birthday to the most beautiful girl 🌸");
                btn.style.transform = 'scale(1)';
            }, 600);
        });
    </script>
</body>
</html>
