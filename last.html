<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Beautiful Memories ✨</title>
    <style>
        /* Style asli last.html tetap + tambahan music player */
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;400;500;600&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffd1dc 0%, #e6e6fa 25%, #ffefd5 50%, #e6e6fa 75%, #ffd1dc 100%);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
            font-family: 'Quicksand', sans-serif;
            overflow-x: hidden;
            color: #4a4a4a;
        }
        @keyframes gradientFlow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        /* ... (semua style asli last.html kamu bisa copy dari repo asli kalau mau) ... */
        /* FLOATING MUSIC PLAYER */
        .music-player {
            position: fixed; bottom: 20px; right: 20px; background: rgba(255,105,180,0.95);
            color: white; border-radius: 50px; padding: 8px 16px; box-shadow: 0 4px 15px rgba(255,105,180,0.4);
            display: flex; align-items: center; gap: 10px; z-index: 9999;
        }
        .heart-icon { font-size: 24px; animation: floatHeart 2s infinite ease-in-out; }
        @keyframes floatHeart { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    </style>
</head>
<body>
    <h1 style="text-align:center; padding-top:2rem; color:#ff69b4; font-family:'Dancing Script',cursive; font-size:3.5rem;">
        Happy Birthday Caca Cantiikkk 💗
    </h1>
    <!-- Isi memory card kamu bisa pakai yang asli, tinggal ganti foto d1.jpg, d2.jpg, d3.jpg -->

    <!-- FLOATING MUSIC PLAYER -->
    <div id="music-player" class="music-player">
        <span class="heart-icon">💖</span>
        <div class="song-info">
            <span class="song-title">P.S. I LOVE YOU</span>
            <span class="artist">Paul Partohap</span>
        </div>
        <button id="play-pause-btn" class="play-btn">▶️</button>
    </div>

    <iframe id="youtube-player" width="0" height="0" 
        src="https://www.youtube.com/embed/n5i3QRvPA9Y?enablejsapi=1&autoplay=0&loop=1&start=18&playlist=n5i3QRvPA9Y" 
        frameborder="0" allow="autoplay; encrypted-media"></iframe>

    <script>
        // Music JS sama seperti di atas
        const playPauseBtn = document.getElementById('play-pause-btn');
        const youtubeIframe = document.getElementById('youtube-player');
        let isPlaying = false;
        function toggleMusic() {
            if (isPlaying) { youtubeIframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*'); playPauseBtn.innerHTML = '▶️'; }
            else { youtubeIframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*'); playPauseBtn.innerHTML = '❚❚'; }
            isPlaying = !isPlaying;
        }
        playPauseBtn.addEventListener('click', toggleMusic);
    </script>
</body>
</html>
